name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # FIX: Changed Java version from 11 to 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' 

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Preparation
        run: |
          cordova platform add android
          
      - name: Build APK
        run: cordova build android --debug -- --gradleArg=-PcdvBuildToolsVersion=33.0.0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Shinobi-Saga-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apknobi-Saga-Final-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
